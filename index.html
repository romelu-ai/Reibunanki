<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英語例文マスター</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:    #1a1f3a;
  --navy2:   #2d3561;
  --navy3:   #3d4882;
  --aqua:    #4ecdc4;
  --aqua2:   #38b2aa;
  --cream:   #f0f4ff;
  --muted:   #8892b0;
  --white:   #ffffff;
  --success: #63e6be;
  --danger:  #ff6b6b;
  --warn:    #ffd166;
  --purple:  #c084fc;
  --lv1:     #4ecdc4;
  --lv2:     #f59e0b;
  --lv3:     #f43f5e;
}

body { background: var(--navy); color: var(--cream); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

/* ── Header ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 24px; border-bottom: 1px solid rgba(78,205,196,.18);
  background: rgba(26,31,58,.92); backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 100; gap: 12px;
}
.logo { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: var(--aqua); letter-spacing: .03em; white-space: nowrap; flex-shrink: 0; }
.logo span { color: var(--cream); }
nav { display: flex; gap: 5px; flex-wrap: wrap; }
.nav-btn {
  padding: 7px 13px; border-radius: 8px; border: 1.5px solid transparent;
  cursor: pointer; font-family: 'Inter', sans-serif; font-size: .8rem; font-weight: 500; transition: all .2s; white-space: nowrap;
}
.nav-btn.active  { background: var(--aqua); color: var(--navy); border-color: var(--aqua); }
.nav-btn.active.fill { background: var(--purple); border-color: var(--purple); color: #fff; }
.nav-btn.outline { background: transparent; color: var(--muted); border-color: var(--navy3); }
.nav-btn.outline:hover { border-color: var(--aqua); color: var(--aqua); }

/* ── Screens ── */
.screen { display: none; flex: 1; padding: 32px 18px; max-width: 860px; margin: 0 auto; width: 100%; }
.screen.active { display: flex; flex-direction: column; }

/* ── Progress ── */
.progress-bar-wrap { height: 4px; background: var(--navy2); border-radius: 4px; margin-bottom: 22px; }
.progress-bar { height: 4px; background: var(--aqua); border-radius: 4px; transition: width .4s ease; }
.counter { text-align: center; color: var(--muted); font-size: .78rem; margin-bottom: 16px; letter-spacing: .06em; text-transform: uppercase; }

/* ── Flip card ── */
.card-scene { perspective: 1200px; width: 100%; max-width: 640px; margin: 0 auto 26px; }
.card {
  width: 100%; aspect-ratio: 16/9; position: relative;
  transform-style: preserve-3d; transition: transform .55s cubic-bezier(.4,0,.2,1); cursor: pointer;
}
.card.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute; inset: 0; backface-visibility: hidden; border-radius: 20px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 26px; text-align: center;
}
.card-front { background: linear-gradient(135deg, var(--navy2) 0%, #1e2550 100%); border: 1.5px solid rgba(78,205,196,.25); box-shadow: 0 20px 60px rgba(0,0,0,.45); }
.card-back  { background: linear-gradient(135deg, #0d2a28 0%, #0d2038 100%); border: 1.5px solid rgba(78,205,196,.4); box-shadow: 0 20px 60px rgba(0,0,0,.45); transform: rotateY(180deg); }
.card-label { font-size: .66rem; letter-spacing: .14em; text-transform: uppercase; color: var(--aqua); margin-bottom: 10px; font-weight: 600; }
.card-english { font-family: 'Fira Code', monospace; font-size: 1.1rem; line-height: 1.8; color: var(--white); }
.card-japanese { font-size: 1rem; line-height: 1.8; color: var(--cream); }
.card-note { margin-top: 12px; font-size: .76rem; color: var(--muted); font-style: italic; }
.flip-hint { font-size: .7rem; color: var(--muted); margin-top: 14px; display: flex; align-items: center; gap: 5px; }
.flip-hint::before { content: '↻'; color: var(--aqua); }
.list-tag { display: inline-block; font-size: .64rem; background: rgba(78,205,196,.12); color: var(--aqua); padding: 2px 8px; border-radius: 4px; margin-top: 8px; }

/* Study actions */
.study-actions { display: flex; justify-content: center; gap: 14px; margin-top: 8px; }
.action-btn { width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; font-size: 1.15rem; display: flex; align-items: center; justify-content: center; transition: transform .15s; }
.action-btn:hover { transform: translateY(-2px); }
.btn-wrong { background: rgba(255,107,107,.18); color: var(--danger); box-shadow: 0 0 0 1.5px var(--danger); }
.btn-hard  { background: rgba(255,209,102,.14); color: var(--warn);   box-shadow: 0 0 0 1.5px var(--warn); }
.btn-good  { background: rgba(99,230,190,.16);  color: var(--success); box-shadow: 0 0 0 1.5px var(--success); }
.btn-wrong:hover { background: rgba(255,107,107,.3); }
.btn-hard:hover  { background: rgba(255,209,102,.28); }
.btn-good:hover  { background: rgba(99,230,190,.3); }
.action-labels { display: flex; justify-content: center; gap: 14px; margin-top: 6px; }
.action-label { width: 50px; text-align: center; font-size: .64rem; color: var(--muted); }

/* ── LEVEL SELECTOR ── */
.level-selector {
  display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap;
}
.lv-btn {
  padding: 9px 20px; border-radius: 10px; border: 2px solid transparent;
  cursor: pointer; font-family: 'Inter', sans-serif; font-size: .82rem; font-weight: 700;
  transition: all .2s; display: flex; align-items: center; gap: 6px;
}
.lv-btn[data-lv="1"] { border-color: var(--lv1); color: var(--lv1); background: rgba(78,205,196,.08); }
.lv-btn[data-lv="2"] { border-color: var(--lv2); color: var(--lv2); background: rgba(245,158,11,.08); }
.lv-btn[data-lv="3"] { border-color: var(--lv3); color: var(--lv3); background: rgba(244,63,94,.08); }
.lv-btn.selected[data-lv="1"] { background: var(--lv1); color: var(--navy); }
.lv-btn.selected[data-lv="2"] { background: var(--lv2); color: var(--navy); }
.lv-btn.selected[data-lv="3"] { background: var(--lv3); color: #fff; }
.lv-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; display: inline-block; }

/* Level indicator badge */
.lv-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: .66rem; font-weight: 700; padding: 3px 10px; border-radius: 20px;
  text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px;
}
.lv-badge[data-lv="1"] { background: rgba(78,205,196,.15);  color: var(--lv1); }
.lv-badge[data-lv="2"] { background: rgba(245,158,11,.15); color: var(--lv2); }
.lv-badge[data-lv="3"] { background: rgba(244,63,94,.15);  color: var(--lv3); }

/* ── FILL-IN CARD ── */
.fill-card {
  background: linear-gradient(135deg, #1c1040 0%, #22103a 100%);
  border-radius: 20px; padding: 28px 24px;
  max-width: 680px; margin: 0 auto 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,.45);
  transition: border-color .3s;
}
.fill-card[data-lv="1"] { border: 1.5px solid rgba(78,205,196,.4); }
.fill-card[data-lv="2"] { border: 1.5px solid rgba(245,158,11,.4); }
.fill-card[data-lv="3"] { border: 1.5px solid rgba(244,63,94,.4); }

.fill-card-label { font-size: .66rem; letter-spacing: .14em; text-transform: uppercase; color: var(--purple); margin-bottom: 10px; font-weight: 600; }

.fill-sentence {
  font-family: 'Fira Code', monospace; font-size: 1.05rem; line-height: 2.6;
  color: var(--white); text-align: center; margin-bottom: 18px;
  word-break: break-word;
}

/* Tap-to-reveal blank */
.fill-blank {
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 6px; padding: 2px 6px; margin: 0 1px;
  font-weight: 700; position: relative; vertical-align: middle;
  cursor: pointer; transition: all .22s cubic-bezier(.4,0,.2,1);
  user-select: none; min-width: 36px;
}
/* Hidden state: coloured block */
.fill-blank.hidden[data-lv="1"] { background: var(--lv1);  color: var(--lv1);  box-shadow: 0 0 0 1.5px var(--lv1); }
.fill-blank.hidden[data-lv="2"] { background: var(--lv2);  color: var(--lv2);  box-shadow: 0 0 0 1.5px var(--lv2); }
.fill-blank.hidden[data-lv="3"] { background: var(--lv3);  color: var(--lv3);  box-shadow: 0 0 0 1.5px var(--lv3); }
.fill-blank.hidden:hover { opacity: .8; transform: scale(1.06); }

/* Revealed state: show the word */
.fill-blank.revealed[data-lv="1"] { background: rgba(78,205,196,.15);  color: var(--lv1);  box-shadow: 0 0 0 1.5px var(--lv1); }
.fill-blank.revealed[data-lv="2"] { background: rgba(245,158,11,.15); color: var(--lv2);  box-shadow: 0 0 0 1.5px var(--lv2); }
.fill-blank.revealed[data-lv="3"] { background: rgba(244,63,94,.15);  color: var(--lv3);  box-shadow: 0 0 0 1.5px var(--lv3); }

/* Char-count hint shown inside hidden block */
.char-hint { font-size: .7rem; font-weight: 400; letter-spacing: .04em; }

/* All-revealed state after "全部表示" */
.fill-blank.all-revealed[data-lv="1"] { background: rgba(78,205,196,.12); color: var(--lv1); box-shadow: 0 0 0 1.5px var(--lv1); }
.fill-blank.all-revealed[data-lv="2"] { background: rgba(245,158,11,.12); color: var(--lv2); box-shadow: 0 0 0 1.5px var(--lv2); }
.fill-blank.all-revealed[data-lv="3"] { background: rgba(244,63,94,.12);  color: var(--lv3); box-shadow: 0 0 0 1.5px var(--lv3); }

.fill-jp { font-size: .88rem; color: var(--muted); text-align: center; line-height: 1.65; margin-bottom: 6px; }
.fill-note { font-size: .76rem; color: var(--muted); font-style: italic; text-align: center; }

.tap-hint { text-align: center; font-size: .72rem; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; justify-content: center; gap: 5px; }
.tap-hint::before { content: '👆'; font-size: .85rem; }

.fill-result { text-align: center; margin-top: 14px; font-size: .9rem; font-weight: 700; min-height: 22px; }
.fill-result.ok  { color: var(--success); }
.fill-result.partial { color: var(--warn); }

.fill-actions { display: flex; justify-content: center; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.fill-btn { padding: 9px 20px; border-radius: 10px; border: none; cursor: pointer; font-family: 'Inter', sans-serif; font-size: .85rem; font-weight: 600; transition: all .2s; }
.fill-btn-all    { background: var(--purple); color: #fff; }
.fill-btn-all:hover { background: #a855f7; }
.fill-btn-next   { background: rgba(78,205,196,.15); color: var(--aqua); border: 1.5px solid var(--aqua); }
.fill-btn-next:hover { background: rgba(78,205,196,.3); }

/* score row */
.score-row { display: flex; justify-content: center; gap: 24px; margin-top: 12px; font-size: .78rem; color: var(--muted); }
.score-row b { color: var(--cream); }

/* ── Manage ── */
.section-title { font-family: 'Playfair Display', serif; font-size: 1.45rem; color: var(--cream); margin-bottom: 6px; }
.section-sub { color: var(--muted); font-size: .84rem; margin-bottom: 26px; }
.add-form { background: var(--navy2); border-radius: 16px; padding: 22px; margin-bottom: 30px; border: 1px solid rgba(78,205,196,.12); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; margin-bottom: 13px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1 / -1; }
label { font-size: .74rem; font-weight: 600; color: var(--aqua); letter-spacing: .06em; text-transform: uppercase; }
input, textarea, select {
  background: var(--navy); border: 1.5px solid var(--navy3); border-radius: 10px;
  padding: 10px 12px; color: var(--cream); font-family: 'Inter', sans-serif; font-size: .91rem;
  transition: border-color .2s; outline: none;
}
input:focus, textarea:focus, select:focus { border-color: var(--aqua); }
textarea { resize: vertical; min-height: 66px; line-height: 1.6; }
.hint-text { font-size: .7rem; color: var(--muted); margin-top: 3px; }
.hint-text code { background: rgba(192,132,252,.15); color: var(--purple); padding: 1px 5px; border-radius: 3px; font-family: 'Fira Code', monospace; }
.add-btn { background: var(--aqua); color: var(--navy); border: none; border-radius: 10px; padding: 10px 24px; font-weight: 700; font-size: .91rem; cursor: pointer; transition: background .2s; }
.add-btn:hover { background: var(--aqua2); }

.cards-list { display: flex; flex-direction: column; gap: 9px; }
.list-item { background: var(--navy2); border-radius: 13px; padding: 14px 16px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; border: 1px solid rgba(78,205,196,.1); transition: border-color .2s; }
.list-item:hover { border-color: rgba(78,205,196,.3); }
.list-item-content { flex: 1; min-width: 0; }
.list-en { font-family: 'Fira Code', monospace; font-size: .86rem; color: var(--white); margin-bottom: 3px; line-height: 1.55; }
.list-en .manual-blank { color: var(--purple); font-weight: 700; }
.list-jp { font-size: .82rem; color: var(--muted); line-height: 1.5; }
.list-actions { display: flex; gap: 5px; flex-shrink: 0; }
.icon-btn { background: none; border: none; cursor: pointer; font-size: .9rem; padding: 5px; border-radius: 6px; color: var(--muted); transition: color .2s, background .2s; }
.icon-btn:hover { background: rgba(255,107,107,.15); color: var(--danger); }

.stats-row { display: flex; gap: 12px; margin-bottom: 26px; flex-wrap: wrap; }
.stat-card { flex: 1; min-width: 72px; background: var(--navy2); border-radius: 11px; padding: 13px 14px; text-align: center; border: 1px solid rgba(78,205,196,.1); }
.stat-num { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--aqua); }
.stat-lbl { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }

/* Complete */
.complete-screen { text-align: center; padding: 44px 20px; }
.complete-icon { font-size: 3.2rem; margin-bottom: 12px; }
.complete-title { font-family: 'Playfair Display', serif; font-size: 1.75rem; color: var(--aqua); margin-bottom: 6px; }
.complete-title.fill { color: var(--purple); }
.complete-sub { color: var(--muted); margin-bottom: 8px; }
.complete-score { font-size: 1.35rem; font-weight: 700; color: var(--cream); margin-bottom: 24px; }
.restart-btn { background: var(--aqua); color: var(--navy); border: none; border-radius: 12px; padding: 12px 30px; font-weight: 700; font-size: .92rem; cursor: pointer; transition: background .2s; margin: 5px; }
.restart-btn:hover { background: var(--aqua2); }
.restart-btn.fill { background: var(--purple); color: #fff; }
.restart-btn.fill:hover { background: #a855f7; }

/* Empty */
.empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
.empty-state .icon { font-size: 2.8rem; margin-bottom: 12px; }
.empty-state p { font-size: .92rem; }

@media (max-width: 600px) {
  header { padding: 11px 12px; }
  .logo { font-size: 1.05rem; }
  .nav-btn { padding: 6px 9px; font-size: .74rem; }
  .form-row { grid-template-columns: 1fr; }
  .card-english, .fill-sentence { font-size: .92rem; }
  .lv-btn { padding: 7px 14px; font-size: .76rem; }
}
@media (prefers-reduced-motion: reduce) { .card { transition: none; } }
</style>
</head>
<body>

<header>
  <div class="logo">英語<span>Master</span></div>
  <nav>
    <button class="nav-btn active"  id="nav-study"  onclick="showScreen('study')">📖 暗記</button>
    <button class="nav-btn outline" id="nav-fill"   onclick="showScreen('fill')">✏️ 穴埋め</button>
    <button class="nav-btn outline" id="nav-manage" onclick="showScreen('manage')">＋ 管理</button>
  </nav>
</header>

<!-- STUDY -->
<main class="screen active" id="screen-study">
  <div id="study-content"></div>
</main>

<!-- FILL-IN -->
<main class="screen" id="screen-fill">
  <div id="fill-content"></div>
</main>

<!-- MANAGE -->
<main class="screen" id="screen-manage">
  <div class="section-title">例文を追加・管理</div>
  <div class="section-sub">例文を入力して暗記リストに追加しましょう</div>
  <div class="add-form">
    <div class="form-row">
      <div class="form-group full">
        <label>英語の例文</label>
        <textarea id="inp-en" placeholder="例: She has been studying English for three years."></textarea>
        <div class="hint-text">重要箇所を手動指定: <code>[単語]</code> で囲む。例: <code>She has [been studying] English for [three years].</code>（Lv.1の穴として使用）</div>
      </div>
      <div class="form-group full">
        <label>日本語訳</label>
        <textarea id="inp-jp" placeholder="例: 彼女は3年間英語を勉強し続けています。"></textarea>
      </div>
      <div class="form-group">
        <label>メモ（任意）</label>
        <input id="inp-note" type="text" placeholder="文法ポイントや使い方など">
      </div>
      <div class="form-group">
        <label>カテゴリ（任意）</label>
        <input id="inp-tag" type="text" placeholder="例: 現在完了形、ビジネス">
      </div>
    </div>
    <button class="add-btn" onclick="addCard()">＋ 追加する</button>
  </div>
  <div class="stats-row" id="stats-row"></div>
  <div class="cards-list" id="cards-list"></div>
</main>

<script>
// ═══════════════════
//  Data
// ═══════════════════
const STORAGE_KEY = 'en_master_v3';
let cards = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') || [
  { id:1, en:"She has [been studying] English for [three years].", jp:"彼女は3年間英語を勉強し続けています。", note:"現在完了進行形", tag:"現在完了形", score:0 },
  { id:2, en:"If I [had known] the answer, I [would have told] you.", jp:"答えを知っていたら、あなたに教えていたのに。", note:"仮定法過去完了", tag:"仮定法", score:0 },
  { id:3, en:"The meeting [has been postponed] until next Monday.", jp:"会議は来週月曜日まで延期されました。", note:"受動態 + 現在完了", tag:"ビジネス", score:0 },
];
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(cards)); }

// ═══════════════════
//  Screen switch
// ═══════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => { b.classList.add('outline'); b.classList.remove('active','fill'); });
  document.getElementById('screen-' + name).classList.add('active');
  const nb = document.getElementById('nav-' + name);
  nb.classList.remove('outline'); nb.classList.add('active');
  if (name === 'fill') nb.classList.add('fill');
  if (name === 'study')  initStudy();
  if (name === 'fill')   initFill();
  if (name === 'manage') renderManage();
}

// ═══════════════════
//  Blank parsing
// ═══════════════════
function hasManual(en) { return /\[/.test(en); }
function cleanEn(en)   { return en.replace(/\[([^\]]+)\]/g, '$1'); }

// Tokenize: [{word, isPunct}]
function tokenize(en) {
  const clean = cleanEn(en);
  return [...clean.matchAll(/([a-zA-Z']+|[^a-zA-Z']+)/g)].map(m => ({
    word: m[0],
    isPunct: !/[a-zA-Z']/.test(m[0])
  }));
}

const FUNCTION_WORDS = new Set([
  'a','an','the','i','you','he','she','it','we','they','me','him','her','us','them',
  'my','your','his','its','our','their','this','that','these','those',
  'is','are','was','were','am','be','been','being',
  'have','has','had','do','does','did','will','would','could','should','may','might','must','shall',
  'to','of','in','on','at','by','for','with','as','from','up','about','into','through','during',
  'and','but','or','nor','so','yet','both','either','neither','not',
  'if','when','while','although','because','since','until','unless','after','before','though',
  'very','just','also','then','than','there','here','now','still','even','back','well',
  'what','which','who','whom','whose','how','where','why'
]);

function isContent(word) {
  return word.length > 2 && !FUNCTION_WORDS.has(word.toLowerCase());
}

/**
 * Build parts for a given level.
 * Returns [{text, isBlank, answer, charHint}]
 *
 * Lv1: manual [brackets] → blank; else 1 important phrase auto
 * Lv2: all content words (verbs/nouns/adj) → blank
 * Lv3: every word → blank, with char-count hint
 */
function buildParts(card, level) {
  const en = card.en;

  // ── Level 1 ──
  if (level === 1) {
    if (hasManual(en)) {
      const parts = [];
      const re = /\[([^\]]+)\]/g;
      let last = 0, m;
      while ((m = re.exec(en)) !== null) {
        if (m.index > last) parts.push({ text: en.slice(last, m.index), isBlank: false });
        parts.push({ text: m[1], isBlank: true, answer: m[1] });
        last = re.lastIndex;
      }
      if (last < en.length) parts.push({ text: en.slice(last), isBlank: false });
      return parts;
    }
    // auto: longest content word or verb group
    const clean = cleanEn(en);
    const patterns = [
      /\b(?:have|has|had)\s+been\s+\w+ing\b/i,
      /\b(?:would|could|should|might)\s+have\s+\w+ed\b/i,
      /\b(?:has|have|had)\s+been\s+\w+ed\b/i,
      /\b(?:will|would|could|should|may|might|must)\s+\w+\b/i,
      /\b(?:is|are|was|were)\s+\w+ed\b/i,
      /\b(?:has|have|had)\s+\w+ed\b/i,
    ];
    let hit = null;
    for (const p of patterns) { const m = clean.match(p); if (m) { hit = m[0]; break; } }
    if (!hit) {
      const words = [...clean.matchAll(/\b[a-zA-Z]{5,}\b/g)].filter(w => isContent(w[0]));
      if (words.length) hit = words.reduce((a,b) => b[0].length > a[0].length ? b : a)[0];
    }
    if (!hit) return [{ text: clean, isBlank: false }];
    const idx = clean.indexOf(hit);
    const parts = [];
    if (idx > 0) parts.push({ text: clean.slice(0, idx), isBlank: false });
    parts.push({ text: hit, isBlank: true, answer: hit });
    if (idx + hit.length < clean.length) parts.push({ text: clean.slice(idx + hit.length), isBlank: false });
    return parts;
  }

  // ── Level 2 ──
  if (level === 2) {
    const clean = cleanEn(en);
    const tokens = tokenize(en);
    const parts = [];
    for (const tok of tokens) {
      if (!tok.isPunct && isContent(tok.word)) {
        parts.push({ text: tok.word, isBlank: true, answer: tok.word });
      } else {
        // merge with previous non-blank if possible
        if (parts.length && !parts[parts.length-1].isBlank) {
          parts[parts.length-1].text += tok.word;
        } else {
          parts.push({ text: tok.word, isBlank: false });
        }
      }
    }
    // guarantee at least 1 blank
    if (!parts.some(p => p.isBlank)) return buildParts(card, 1);
    return parts;
  }

  // ── Level 3 ──
  if (level === 3) {
    const tokens = tokenize(en);
    const parts = [];
    for (const tok of tokens) {
      if (!tok.isPunct) {
        const ans = hasManual(en) ? tok.word.replace(/\[|\]/g,'') : tok.word;
        parts.push({ text: ans, isBlank: true, answer: ans, charHint: ans.length });
      } else {
        if (parts.length && !parts[parts.length-1].isBlank) {
          parts[parts.length-1].text += tok.word;
        } else {
          parts.push({ text: tok.word, isBlank: false });
        }
      }
    }
    return parts;
  }
}

// ═══════════════════
//  STUDY mode
// ═══════════════════
let studyQueue=[], studyIdx=0, flipped=false;

function initStudy() {
  studyQueue = [...cards].sort(()=>Math.random()-.5);
  studyIdx=0; flipped=false; renderStudy();
}

function renderStudy() {
  const el = document.getElementById('study-content');
  if (!cards.length) { el.innerHTML = emptyHtml(); return; }
  if (studyIdx >= studyQueue.length) { el.innerHTML = completeHtml(studyQueue.length, false); return; }
  const card = studyQueue[studyIdx];
  const pct  = Math.round(studyIdx/studyQueue.length*100);
  el.innerHTML = `
    <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
    <div class="counter">${studyIdx+1} / ${studyQueue.length}</div>
    <div class="card-scene"><div class="card" id="flip-card" onclick="flipCard()">
      <div class="card-face card-front">
        <div class="card-label">English</div>
        <div class="card-english">${escHtml(cleanEn(card.en))}</div>
        ${card.tag ? `<div class="list-tag">${escHtml(card.tag)}</div>` : ''}
        <div class="flip-hint">タップして日本語を確認</div>
      </div>
      <div class="card-face card-back">
        <div class="card-label">日本語訳</div>
        <div class="card-japanese">${escHtml(card.jp)}</div>
        ${card.note ? `<div class="card-note">💡 ${escHtml(card.note)}</div>` : ''}
      </div>
    </div></div>
    <div class="study-actions" id="answer-actions" style="display:none">
      <button class="action-btn btn-wrong" onclick="studyAnswer('wrong')">✗</button>
      <button class="action-btn btn-hard"  onclick="studyAnswer('hard')">△</button>
      <button class="action-btn btn-good"  onclick="studyAnswer('good')">✓</button>
    </div>
    <div class="action-labels" id="answer-labels" style="display:none">
      <div class="action-label">もう一度</div><div class="action-label">難しい</div><div class="action-label">わかった</div>
    </div>`;
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('flip-card').classList.toggle('flipped', flipped);
  if (flipped) {
    document.getElementById('answer-actions').style.display = 'flex';
    document.getElementById('answer-labels').style.display  = 'flex';
  }
}

function studyAnswer(level) {
  const card = studyQueue[studyIdx];
  const c = cards.find(c=>c.id===card.id);
  if (c) { if (level==='good') c.score++; else if (level==='wrong') c.score=Math.max(0,c.score-1); save(); }
  if (level==='wrong') studyQueue.push(card);
  studyIdx++; flipped=false; renderStudy();
}

// ═══════════════════
//  FILL-IN mode
// ═══════════════════
let fillQueue=[], fillIdx=0, fillLevel=1, fillChecked=false, fillCorrect=0;

const LV_INFO = {
  1: { label:'かんたん', icon:'🟢', desc:'重要フレーズのみ' },
  2: { label:'ふつう',   icon:'🟡', desc:'内容語を穴埋め' },
  3: { label:'むずかしい',icon:'🔴', desc:'全単語を入力' },
};

function initFill() {
  fillQueue = [...cards].sort(()=>Math.random()-.5);
  fillIdx=0;
  renderFill();
}

function setLevel(lv) {
  fillLevel = lv;
  fillIdx=0;
  fillQueue = [...cards].sort(()=>Math.random()-.5);
  renderFill();
}

function renderFill() {
  const el = document.getElementById('fill-content');
  if (!cards.length) { el.innerHTML = emptyHtml(); return; }
  if (fillIdx >= fillQueue.length) { el.innerHTML = completeFillHtml(); return; }

  const card  = fillQueue[fillIdx];
  const parts = buildParts(card, fillLevel);
  const pct   = Math.round(fillIdx/fillQueue.length*100);
  const info  = LV_INFO[fillLevel];

  // Build sentence: blanks start hidden, tap to reveal
  let sentenceHtml = parts.map((p, i) => {
    if (!p.isBlank) return `<span>${escHtml(p.text)}</span>`;
    // Show char count inside the hidden block for Lv3, just spaces for others
    const insideHtml = fillLevel === 3
      ? `<span class="char-hint">${p.charHint}文字</span>`
      : `<span style="opacity:0">${escHtml(p.answer)}</span>`; // invisible spacer keeps width
    return `<span class="fill-blank hidden" data-lv="${fillLevel}" data-answer="${escHtml(p.answer)}" id="blank-${i}" onclick="tapBlank(${i})" title="タップして表示">${insideHtml}</span>`;
  }).join('');

  el.innerHTML = `
    <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%; background:${fillLevel===1?'var(--lv1)':fillLevel===2?'var(--lv2)':'var(--lv3)'}"></div></div>

    <div class="level-selector">
      ${[1,2,3].map(lv => `
        <button class="lv-btn ${lv===fillLevel?'selected':''}" data-lv="${lv}" onclick="setLevel(${lv})">
          <span class="lv-dot"></span>${LV_INFO[lv].label}
        </button>`).join('')}
    </div>

    <div class="counter">${fillIdx+1} / ${fillQueue.length}</div>

    <div class="fill-card" data-lv="${fillLevel}">
      <div style="text-align:center;margin-bottom:10px">
        <span class="lv-badge" data-lv="${fillLevel}">${info.icon} Lv.${fillLevel} ${info.label} — ${info.desc}</span>
      </div>
      <div class="tap-hint">隠れた単語をタップして確認</div>
      <div class="fill-sentence" id="fill-sentence">${sentenceHtml}</div>
      <div class="fill-jp">${escHtml(card.jp)}</div>
      ${card.note ? `<div class="fill-note">💡 ${escHtml(card.note)}</div>` : ''}
      <div class="fill-result" id="fill-result"></div>
      <div class="fill-actions">
        <button class="fill-btn fill-btn-all" id="btn-all" onclick="revealAll()">全部表示</button>
        <button class="fill-btn fill-btn-next" id="btn-next" onclick="nextFill()">次へ →</button>
      </div>
    </div>
    <div class="score-row">タップ済み: <b id="sc-revealed">0</b> / <b>${parts.filter(p=>p.isBlank).length}</b> &nbsp;|&nbsp; 問題: <b>${fillIdx+1}</b> / <b>${fillQueue.length}</b></div>`;
}

// Tap a single blank to reveal it
function tapBlank(i) {
  const wrap = document.getElementById(`blank-${i}`);
  if (!wrap || !wrap.classList.contains('hidden')) return;
  const answer = wrap.dataset.answer;
  wrap.classList.remove('hidden');
  wrap.classList.add('revealed');
  wrap.innerHTML = escHtml(answer);
  wrap.onclick = null; // disable further taps
  updateRevealCount();
}

function updateRevealCount() {
  const total    = document.querySelectorAll('.fill-blank').length;
  const revealed = document.querySelectorAll('.fill-blank.revealed, .fill-blank.all-revealed').length;
  const sc = document.getElementById('sc-revealed');
  if (sc) sc.textContent = revealed;
  if (revealed === total) {
    const res = document.getElementById('fill-result');
    if (res && !res.textContent) {
      res.textContent = '✅ 全部確認しました！'; res.className = 'fill-result ok';
    }
  }
}

function revealAll() {
  document.querySelectorAll('.fill-blank.hidden').forEach(wrap => {
    const answer = wrap.dataset.answer;
    wrap.classList.remove('hidden');
    wrap.classList.add('all-revealed');
    wrap.innerHTML = escHtml(answer);
    wrap.onclick = null;
  });
  updateRevealCount();
  const res = document.getElementById('fill-result');
  if (res) { res.textContent = '💡 すべて表示しました'; res.className = 'fill-result partial'; }
}

function nextFill() { fillIdx++; renderFill(); }

function completeFillHtml() {
  return `<div class="complete-screen">
    <div class="complete-icon">✏️</div>
    <div class="complete-title fill">穴埋め完了！</div>
    <div class="complete-sub">Lv.${fillLevel} ${LV_INFO[fillLevel].label} — ${fillQueue.length}問すべて確認</div>
    <button class="restart-btn fill" onclick="setLevel(${fillLevel})">同じレベルで再挑戦</button>
    ${fillLevel < 3 ? `<button class="restart-btn fill" onclick="setLevel(${fillLevel+1})">Lv.${fillLevel+1}に挑戦 →</button>` : ''}
    <button class="restart-btn" onclick="showScreen('study')">暗記モードへ</button>
  </div>`;
}

// ═══════════════════
//  MANAGE
// ═══════════════════
function renderManage() {
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-num">${cards.length}</div><div class="stat-lbl">合計</div></div>
    <div class="stat-card"><div class="stat-num">${cards.filter(c=>c.score>=3).length}</div><div class="stat-lbl">習得済み</div></div>
    <div class="stat-card"><div class="stat-num">${cards.filter(c=>c.score===0).length}</div><div class="stat-lbl">未学習</div></div>
    <div class="stat-card"><div class="stat-num">${cards.filter(c=>hasManual(c.en)).length}</div><div class="stat-lbl">手動穴</div></div>`;
  const el = document.getElementById('cards-list');
  if (!cards.length) { el.innerHTML='<p style="color:var(--muted);text-align:center;padding:20px">例文はまだありません</p>'; return; }
  el.innerHTML = cards.map((c,i) => {
    const displayEn = c.en.replace(/\[([^\]]+)\]/g,'<span class="manual-blank">[$1]</span>');
    return `<div class="list-item">
      <div class="list-item-content">
        <div class="list-en">${displayEn}</div>
        <div class="list-jp">${escHtml(c.jp)}</div>
        ${c.tag?`<span class="list-tag">${escHtml(c.tag)}</span>`:''}
      </div>
      <div class="list-actions"><button class="icon-btn" onclick="deleteCard(${i})">🗑</button></div>
    </div>`;
  }).join('');
}

function addCard() {
  const en=document.getElementById('inp-en').value.trim();
  const jp=document.getElementById('inp-jp').value.trim();
  const note=document.getElementById('inp-note').value.trim();
  const tag=document.getElementById('inp-tag').value.trim();
  if (!en||!jp) { alert('英語と日本語訳は必須です。'); return; }
  cards.push({ id:Date.now(), en, jp, note, tag, score:0 });
  save();
  ['inp-en','inp-jp','inp-note','inp-tag'].forEach(id=>document.getElementById(id).value='');
  renderManage();
}

function deleteCard(i) {
  if (!confirm('この例文を削除しますか？')) return;
  cards.splice(i,1); save(); renderManage();
}

// ═══════════════════
//  Helpers
// ═══════════════════
function emptyHtml() {
  return `<div class="empty-state"><div class="icon">📚</div><p>まだ例文がありません。<br>「管理」タブから追加してください。</p></div>`;
}
function completeHtml(total, isFill) {
  return `<div class="complete-screen">
    <div class="complete-icon">🎉</div>
    <div class="complete-title">セッション完了！</div>
    <div class="complete-sub">${total}枚すべて確認しました。</div>
    <button class="restart-btn" onclick="initStudy()">もう一度</button>
    <button class="restart-btn fill" onclick="showScreen('fill')">穴埋めに挑戦</button>
  </div>`;
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

initStudy();
</script>
